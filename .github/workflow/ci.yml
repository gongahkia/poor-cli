name: Haus CI/CD on push
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv venv --python 3.11
      - run: uv pip install -e ".[dev]"
      - run: ruff check src/ tests/
      - run: pyright src/
      - run: pytest tests/ -q
