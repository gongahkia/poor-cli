name: Implementation Task
description: Concrete code, docs, or operations task.
title: ""
labels: ["kind:task"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be implemented?
    validations:
      required: true
  - type: dropdown
    id: interface_impact
    attributes:
      label: Interface Impact
      options:
        - No public interface change
        - Web UI/UX
        - REST gateway
        - MCP/tool contract
        - Docs/examples only
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: "- [ ] ..."
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Tests And Verification
      description: Name the focused tests, browser checks, smoke checks, or docs checks required.
      placeholder: "- npm run verify"
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Compatibility Constraints
      value: |
        - Do not rename or break existing `sg_*` tool names or schemas.
        - Do not rename `@dude/mcp` package/runtime identity without a compatibility plan.
        - Do not change `SG_API_*`, `SG_APIS_*`, or `sg://...` contracts.
        - Keep outputs grounded in public data, provenance, freshness, gaps, and limits.
    validations:
      required: true
