name: Poor-CLI Production Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  python-backend-validation:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install multimedia dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg pkg-config libavformat-dev libavcodec-dev libavdevice-dev libavutil-dev libavfilter-dev libswscale-dev libswresample-dev

      - name: Create venv and install Python package/dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -e .

      - name: Run Python backend smoke checks
        run: |
          .venv/bin/python -m compileall poor_cli
          .venv/bin/poor-cli --help
          .venv/bin/poor-cli exec --help
          .venv/bin/poor-cli task --help
          .venv/bin/poor-cli automation --help
          .venv/bin/poor-cli skill --help
          .venv/bin/poor-cli diag doctor --help
          .venv/bin/poor-cli pr review --help
          .venv/bin/poor-cli server --help

      - name: Install test dependencies
        run: .venv/bin/pip install pytest pytest-cov

      - name: Run Python test suite with coverage
        run: |
          .venv/bin/python -m pytest tests/ -x -q --cov=poor_cli --cov-report=term-missing --cov-fail-under=40

  python-package:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: macos-14
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.11"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Python wheel
        run: python -m build --wheel

      - name: Wheel install smoke test
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import subprocess
          import tempfile
          import venv

          venv_dir = pathlib.Path("wheel-smoke-venv").resolve()
          venv.EnvBuilder(with_pip=True, clear=True).create(venv_dir)
          scripts_dir = venv_dir / ("Scripts" if os.name == "nt" else "bin")
          python = scripts_dir / ("python.exe" if os.name == "nt" else "python")
          poor_cli = scripts_dir / ("poor-cli.exe" if os.name == "nt" else "poor-cli")
          poor_cli_server = scripts_dir / ("poor-cli-server.exe" if os.name == "nt" else "poor-cli-server")
          wheel_path = next(pathlib.Path("dist").glob("*.whl"))

          subprocess.check_call([str(python), "-m", "pip", "install", "--upgrade", "pip"])
          subprocess.check_call([str(python), "-m", "pip", "install", str(wheel_path)])

          with tempfile.TemporaryDirectory() as tmpdir:
              subprocess.check_call([str(poor_cli), "--help"], cwd=tmpdir)
              subprocess.check_call([str(poor_cli), "exec", "--help"], cwd=tmpdir)
              subprocess.check_call([str(poor_cli), "task", "--help"], cwd=tmpdir)
              subprocess.check_call([str(poor_cli), "automation", "--help"], cwd=tmpdir)
              subprocess.check_call([str(poor_cli), "skills", "--help"], cwd=tmpdir)
              subprocess.check_call([str(poor_cli), "commands", "--help"], cwd=tmpdir)
              payload = json.loads(
                  subprocess.check_output(
                      [str(poor_cli), "install-info", "--json"],
                      cwd=tmpdir,
                      text=True,
                  )
              )
              selected = payload.get("selectedLauncher") or {}
              if selected.get("source") != "package":
                  raise SystemExit(f"expected packaged launcher, got {selected!r}")
              subprocess.check_call([str(poor_cli_server), "--help"], cwd=tmpdir)
          PY

      - name: Validate Python distributions
        run: twine check dist/*.whl

  python-sdist:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Python source distribution
        run: python -m build --sdist

      - name: Validate source distribution
        run: twine check dist/*.tar.gz

  lua-syntax:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Validate Neovim plugin Lua syntax
        run: |
          luac5.4 -p nvim-poor-cli/lua/poor-cli/config.lua
          luac5.4 -p nvim-poor-cli/lua/poor-cli/health.lua
          luac5.4 -p nvim-poor-cli/lua/poor-cli/rpc.lua
          luac5.4 -p nvim-poor-cli/lua/poor-cli/commands.lua
          luac5.4 -p nvim-poor-cli/lua/poor-cli/chat.lua

  lua-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        neovim-version: ["v0.10.0"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Neovim ${{ matrix.neovim-version }}
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim-version }}

      - name: Check out plenary.nvim
        uses: actions/checkout@v4
        with:
          repository: nvim-lua/plenary.nvim
          path: nvim-poor-cli/.test-runtime/site/pack/test/start/plenary.nvim

      - name: Run Lua specs
        run: PLENARY_DIR="$PWD/nvim-poor-cli/.test-runtime/site/pack/test/start/plenary.nvim" make test-lua

  performance-guardrails:
    runs-on: ubuntu-latest
    env:
      PYTHONHASHSEED: "0"
      TZ: "UTC"
      LANG: "C.UTF-8"
      LC_ALL: "C.UTF-8"
      POORCLI_PERF_PIN_CPU: "0"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Neovim v0.10.0
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: v0.10.0

      - name: Install package
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -e .

      - name: Restore perf trend cache
        if: always()
        uses: actions/cache/restore@v4
        with:
          path: bench-trend-history
          key: perf-trend-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            perf-trend-${{ github.ref_name }}-

      - name: Best-effort pin perf host
        run: bench/pin_perf_host.sh

      - name: Run startup profile (head x3 short)
        run: |
          for seed in 11 22 33; do
            bench/run_pinned.sh .venv/bin/python bench/startup_profile.py --runs 10 --seed "$seed" --output "bench-head-$seed.json"
          done
          .venv/bin/python bench/perf_profile_reduce.py \
            --inputs bench-head-11.json,bench-head-22.json,bench-head-33.json \
            --report-path bench-head.json

      - name: Build base profiles and compare (PR)
        if: github.event_name == 'pull_request'
        run: |
          HEAD_SHA="$(git rev-parse HEAD)"
          EVENT_BASE_SHA="${{ github.event.pull_request.base.sha }}"
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          git fetch --no-tags --depth=200 origin "$BASE_REF"
          MERGE_BASE_SHA="$(git merge-base "$HEAD_SHA" "origin/$BASE_REF" || true)"
          if [ -z "$MERGE_BASE_SHA" ]; then
            git fetch --no-tags --depth=1000 origin "$BASE_REF"
            MERGE_BASE_SHA="$(git merge-base "$HEAD_SHA" "origin/$BASE_REF" || true)"
          fi
          SELECTED_BASE_SHA="$EVENT_BASE_SHA"
          if [ -n "$MERGE_BASE_SHA" ]; then
            SELECTED_BASE_SHA="$MERGE_BASE_SHA"
          fi
          HEAD_SHA="$HEAD_SHA" EVENT_BASE_SHA="$EVENT_BASE_SHA" BASE_REF="$BASE_REF" MERGE_BASE_SHA="$MERGE_BASE_SHA" SELECTED_BASE_SHA="$SELECTED_BASE_SHA" .venv/bin/python - <<'PY'
          import json
          import os
          from pathlib import Path

          Path("bench-baseline-meta.json").write_text(
              json.dumps(
                  {
                      "head_sha": os.environ.get("HEAD_SHA", ""),
                      "event_base_sha": os.environ.get("EVENT_BASE_SHA", ""),
                      "base_ref": os.environ.get("BASE_REF", ""),
                      "merge_base_sha": os.environ.get("MERGE_BASE_SHA", ""),
                      "selected_base_sha": os.environ.get("SELECTED_BASE_SHA", ""),
                  },
                  sort_keys=True,
              )
              + "\n",
              encoding="utf-8",
          )
          PY
          git checkout --detach "$SELECTED_BASE_SHA"
          .venv/bin/pip install -e .
          for seed in 11 22 33; do
            bench/run_pinned.sh .venv/bin/python bench/startup_profile.py --runs 10 --seed "$seed" --output "bench-base-$seed.json"
          done
          .venv/bin/python bench/perf_profile_reduce.py \
            --inputs bench-base-11.json,bench-base-22.json,bench-base-33.json \
            --report-path bench-base.json
          git checkout --detach "$HEAD_SHA"
          .venv/bin/pip install -e .
          .venv/bin/python bench/perf_compare.py --baseline bench-base.json --candidate bench-head.json --report-path bench-compare.json || true

      - name: Gate quick-quit regressions with bootstrap (PR)
        if: github.event_name == 'pull_request'
        run: |
          .venv/bin/python bench/perf_bootstrap_gate.py \
            --baseline-list bench-base-11.json,bench-base-22.json,bench-base-33.json \
            --candidate-list bench-head-11.json,bench-head-22.json,bench-head-33.json \
            --metrics quick_quit_mean_ms,quick_quit_p50_ms,quick_quit_stall_p95_ms,quick_quit_stall_ultrafast_p95_ms \
            --relative-threshold 0.10 \
            --absolute-threshold-ms 5 \
            --bootstrap-samples 12000 \
            --seed 42 \
            --report-path bench-compare-quick-quit.json

      - name: Append startup trend history
        if: always()
        run: |
          .venv/bin/python - <<'PY'
          import json
          import os
          from pathlib import Path

          trend_path = Path("bench-trend-history") / "bench-trend.jsonl"
          trend_path.parent.mkdir(parents=True, exist_ok=True)
          entries = []

          def add_entry(path: str, profile: str) -> None:
              fp = Path(path)
              if not fp.exists():
                  return
              payload = json.loads(fp.read_text(encoding="utf-8"))
              entries.append({
                  "profile": profile,
                  "event": os.environ.get("GITHUB_EVENT_NAME", ""),
                  "run_id": os.environ.get("GITHUB_RUN_ID", ""),
                  "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
                  "sha": os.environ.get("GITHUB_SHA", ""),
                  "ref": os.environ.get("GITHUB_REF_NAME", ""),
                  "metrics": payload,
              })

          add_entry("bench-base.json", "base")
          add_entry("bench-head.json", "head")
          existing = trend_path.read_text(encoding="utf-8").splitlines() if trend_path.exists() else []
          for row in entries:
              existing.append(json.dumps(row, sort_keys=True))
          max_rows = 600
          trend_path.write_text("\n".join(existing[-max_rows:]) + ("\n" if existing else ""), encoding="utf-8")
          PY

      - name: Reduce quick-quit history
        if: always()
        run: |
          .venv/bin/python bench/perf_history_reduce.py \
            --input bench-trend-history/bench-trend.jsonl \
            --window 40 \
            --output bench-history-reduced.json

      - name: Build perf trend dashboard
        if: always()
        run: |
          .venv/bin/python bench/perf_trend_dashboard.py \
            --input bench-trend-history/bench-trend.jsonl \
            --window 40 \
            --output-json bench-trend-dashboard.json \
            --output-markdown bench-trend-dashboard.md

      - name: Save perf trend cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: bench-trend-history
          key: perf-trend-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Publish perf summary table
        if: always()
        run: |
          .venv/bin/python - <<'PY'
          import json
          from pathlib import Path

          summary_path = Path(__import__("os").environ["GITHUB_STEP_SUMMARY"])
          head = json.loads(Path("bench-head.json").read_text(encoding="utf-8")) if Path("bench-head.json").exists() else {}
          compare = json.loads(Path("bench-compare.json").read_text(encoding="utf-8")) if Path("bench-compare.json").exists() else {}
          quick_quit_compare = json.loads(Path("bench-compare-quick-quit.json").read_text(encoding="utf-8")) if Path("bench-compare-quick-quit.json").exists() else {}
          history_reduce = json.loads(Path("bench-history-reduced.json").read_text(encoding="utf-8")) if Path("bench-history-reduced.json").exists() else {}
          baseline_meta = json.loads(Path("bench-baseline-meta.json").read_text(encoding="utf-8")) if Path("bench-baseline-meta.json").exists() else {}
          trend_dashboard_md = Path("bench-trend-dashboard.md").read_text(encoding="utf-8") if Path("bench-trend-dashboard.md").exists() else ""
          guardrail = json.loads(Path("bench-guardrail.json").read_text(encoding="utf-8")) if Path("bench-guardrail.json").exists() else {}
          rows = compare.get("comparisons", []) if isinstance(compare, dict) else []
          quick_quit_rows = quick_quit_compare.get("comparisons", []) if isinstance(quick_quit_compare, dict) else []
          history_rows = history_reduce.get("metrics", []) if isinstance(history_reduce, dict) else []
          scenario_rows = guardrail.get("scenarioRows", []) if isinstance(guardrail, dict) else []
          with summary_path.open("a", encoding="utf-8") as fh:
              fh.write("### Performance Summary\n\n")
              if rows:
                  fh.write("| Metric | Base (ms) | Head (ms) | Δ (ms) | Allowed (ms) | Status |\n")
                  fh.write("|---|---:|---:|---:|---:|---|\n")
                  for row in rows:
                      status = "REGRESSION" if row.get("regressed") else "OK"
                      fh.write(
                          "| {metric} | {base:.2f} | {head_v:.2f} | {delta:.2f} | {allowed:.2f} | {status} |\n".format(
                              metric=row.get("metric", ""),
                              base=float(row.get("baselineMs", 0.0)),
                              head_v=float(row.get("candidateMs", 0.0)),
                              delta=float(row.get("deltaMs", 0.0)),
                              allowed=float(row.get("allowedDeltaMs", 0.0)),
                              status=status,
                          )
                      )
              elif head:
                  fh.write("| Metric | Head (ms) |\n")
                  fh.write("|---|---:|\n")
                  for metric in ("first_tick_p95_ms", "warm_setup_return_p95_ms", "warm_setup_complete_p95_ms", "quick_quit_mean_ms", "quick_quit_p50_ms", "quick_quit_stall_p95_ms"):
                      fh.write(f"| {metric} | {float(head.get(metric, 0.0)):.2f} |\n")
              if quick_quit_rows:
                  fh.write("\n### Quick-Quit Gate\n\n")
                  fh.write("| Metric | Base Mean (ms) | Head Mean (ms) | Δ Mean (ms) | Δ CI Low (ms) | Δ CI High (ms) | Allowed (ms) | Status |\n")
                  fh.write("|---|---:|---:|---:|---:|---:|---:|---|\n")
                  for row in quick_quit_rows:
                      status = "REGRESSION" if row.get("regressed") else "OK"
                      fh.write(
                          "| {metric} | {base:.2f} | {head_v:.2f} | {delta:.2f} | {ci_low:.2f} | {ci_high:.2f} | {allowed:.2f} | {status} |\n".format(
                              metric=row.get("metric", ""),
                              base=float(row.get("baselineMeanMs", 0.0)),
                              head_v=float(row.get("candidateMeanMs", 0.0)),
                              delta=float(row.get("deltaMeanMs", 0.0)),
                              ci_low=float(row.get("deltaCiLowMs", 0.0)),
                              ci_high=float(row.get("deltaCiHighMs", 0.0)),
                              allowed=float(row.get("allowedDeltaMs", 0.0)),
                              status=status,
                          )
                      )
              if history_rows:
                  fh.write("\n### Quick-Quit Rolling Median/MAD\n\n")
                  fh.write("| Metric | Count | Median (ms) | MAD (ms) | Min (ms) | Max (ms) |\n")
                  fh.write("|---|---:|---:|---:|---:|---:|\n")
                  for row in history_rows:
                      fh.write(
                          "| {metric} | {count} | {median:.2f} | {mad:.2f} | {min_v:.2f} | {max_v:.2f} |\n".format(
                              metric=row.get("metric", ""),
                              count=int(row.get("count", 0)),
                              median=float(row.get("median_ms", 0.0)),
                              mad=float(row.get("mad_ms", 0.0)),
                              min_v=float(row.get("min_ms", 0.0)),
                              max_v=float(row.get("max_ms", 0.0)),
                          )
                      )
              if scenario_rows:
                  fh.write("\n### Perf Scenarios\n\n")
                  fh.write("| Scenario | Signal A (ms) | Signal B (ms) |\n")
                  fh.write("|---|---:|---:|\n")
                  for row in scenario_rows:
                      name = str(row.get("scenario", ""))
                      if name == "normal":
                          fh.write(
                              f"| {name} | {float(row.get('setupCompleteMeanMs', 0.0)):.2f} | {float(row.get('quickQuitMeanMs', 0.0)):.2f} |\n"
                          )
                      elif name == "backend_unavailable":
                          fh.write(
                              f"| {name} | {float(row.get('providerProbeColdMs', 0.0)):.2f} | {float(row.get('providerProbeRepeatMeanMs', 0.0)):.2f} |\n"
                          )
                      elif name == "stalled_exit":
                          fh.write(
                              f"| {name} | {float(row.get('quickQuitStallMeanMs', 0.0)):.2f} | {float(row.get('quickQuitStallP95Ms', 0.0)):.2f} |\n"
                          )
                      else:
                          fh.write(
                              f"| {name} | {float(row.get('setupCompleteP99Ms', 0.0)):.2f} | {float(row.get('mockTtftP95Ms', 0.0)):.2f} |\n"
                          )
              if trend_dashboard_md:
                  fh.write("\n### Trend Dashboard\n\n")
                  fh.write(trend_dashboard_md + "\n")
              if baseline_meta:
                  fh.write("\n### Baseline Selection\n\n")
                  fh.write("| Field | Value |\n")
                  fh.write("|---|---|\n")
                  fh.write(f"| base_ref | {baseline_meta.get('base_ref', '')} |\n")
                  fh.write(f"| event_base_sha | {baseline_meta.get('event_base_sha', '')} |\n")
                  fh.write(f"| merge_base_sha | {baseline_meta.get('merge_base_sha', '')} |\n")
                  fh.write(f"| selected_base_sha | {baseline_meta.get('selected_base_sha', '')} |\n")
              fh.write("\n")
          PY

      - name: Upload startup benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: startup-profile-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          path: |
            bench-head.json
            bench-base.json
            bench-head-11.json
            bench-head-22.json
            bench-head-33.json
            bench-base-11.json
            bench-base-22.json
            bench-base-33.json
            bench-compare.json
            bench-compare-quick-quit.json
            bench-trend-history/bench-trend.jsonl
            bench-history-reduced.json
            bench-trend-dashboard.json
            bench-trend-dashboard.md
            bench-baseline-meta.json
            bench-guardrail.json
          if-no-files-found: ignore

      - name: Run perf guardrails (PR soft)
        if: github.event_name == 'pull_request'
        env:
          POORCLI_PERF_MAX_FIRST_TICK_MS: "20"
          POORCLI_PERF_MAX_SETUP_RETURN_MS: "45"
          POORCLI_PERF_MAX_SETUP_COMPLETE_MS: "120"
          POORCLI_PERF_MAX_QUICK_QUIT_MS: "180"
          POORCLI_PERF_MAX_STALLED_QUIT_P95_MS: "3200"
          POORCLI_PERF_MAX_PROVIDER_PROBE_COLD_MS: "700"
          POORCLI_PERF_MAX_PROVIDER_PROBE_REPEAT_MS: "3.5"
          POORCLI_PERF_MAX_MOCK_TTFT_MS: "1800"
        run: .venv/bin/python bench/perf_guardrail.py --report-path bench-guardrail.json

      - name: Run perf guardrails (main hard)
        if: github.event_name != 'pull_request'
        env:
          POORCLI_PERF_MAX_FIRST_TICK_MS: "15"
          POORCLI_PERF_MAX_SETUP_RETURN_MS: "30"
          POORCLI_PERF_MAX_SETUP_COMPLETE_MS: "80"
          POORCLI_PERF_MAX_QUICK_QUIT_MS: "120"
          POORCLI_PERF_MAX_STALLED_QUIT_P95_MS: "2800"
          POORCLI_PERF_MAX_PROVIDER_PROBE_COLD_MS: "500"
          POORCLI_PERF_MAX_PROVIDER_PROBE_REPEAT_MS: "2.0"
          POORCLI_PERF_MAX_MOCK_TTFT_MS: "1400"
        run: .venv/bin/python bench/perf_guardrail.py --report-path bench-guardrail.json

  provider-probe-guardrails:
    runs-on: ubuntu-latest
    env:
      PYTHONHASHSEED: "0"
      TZ: "UTC"
      LANG: "C.UTF-8"
      LC_ALL: "C.UTF-8"
      POORCLI_PERF_PIN_CPU: "0"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -e .

      - name: Warm and pin host for provider probe
        run: bench/pin_perf_host.sh

      - name: Run isolated provider probe repeats
        if: always()
        run: |
          for run in 1 2 3; do
            bench/pin_perf_host.sh
            bench/run_pinned.sh .venv/bin/python bench/provider_probe_breakdown.py --runs 4 --output "bench-provider-probe-$run.json" || true
          done
          .venv/bin/python - <<'PY'
          from pathlib import Path
          import subprocess

          paths = sorted(str(path) for path in Path(".").glob("bench-provider-probe-*.json"))
          if paths:
              subprocess.check_call(
                  [
                      ".venv/bin/python",
                      "bench/perf_profile_reduce.py",
                      "--inputs",
                      ",".join(paths),
                      "--report-path",
                      "bench-provider-probe-breakdown.json",
                  ]
              )
          PY

      - name: Publish provider probe summary
        if: always()
        run: |
          .venv/bin/python - <<'PY'
          import json
          from pathlib import Path

          summary_path = Path(__import__("os").environ["GITHUB_STEP_SUMMARY"])
          reduced = json.loads(Path("bench-provider-probe-breakdown.json").read_text(encoding="utf-8")) if Path("bench-provider-probe-breakdown.json").exists() else {}
          with summary_path.open("a", encoding="utf-8") as fh:
              fh.write("### Provider Probe Isolated Summary\n\n")
              if not reduced:
                  fh.write("No provider probe data collected.\n\n")
              else:
                  fh.write("| Metric | Mean (ms) | P50 (ms) | P95 (ms) |\n")
                  fh.write("|---|---:|---:|---:|\n")
                  for prefix in ("probe_total", "cache_load", "tcp_connect", "http_probe"):
                      fh.write(
                          f"| {prefix} | {float(reduced.get(prefix + '_mean_ms', 0.0)):.2f} | {float(reduced.get(prefix + '_p50_ms', 0.0)):.2f} | {float(reduced.get(prefix + '_p95_ms', 0.0)):.2f} |\n"
                      )
                  fh.write("\n")
          PY

      - name: Upload provider probe artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-probe-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          path: |
            bench-provider-probe-1.json
            bench-provider-probe-2.json
            bench-provider-probe-3.json
            bench-provider-probe-breakdown.json
          if-no-files-found: ignore

  go-internal-coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go coverage
        run: make coverage

      - name: Run fixture e2e
        run: make test-e2e

      - name: Upload Go coverage report
        uses: actions/upload-artifact@v4
        with:
          name: go-internal-coverage
          path: |
            coverage.out
            coverage.html

  docker-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t poor-cli-smoke .

      - name: Verify poor-cli entrypoint
        run: docker run --rm poor-cli-smoke --help
