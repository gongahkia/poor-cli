name: Poor-CLI Production Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-backend-validation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install multimedia dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg pkg-config libavformat-dev libavcodec-dev libavdevice-dev libavutil-dev libavfilter-dev libswscale-dev libswresample-dev

      - name: Install Python package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Python backend smoke checks
        run: |
          python -m compileall poor_cli
          python -m poor_cli.command_manifest --check
          poor-cli --help
          poor-cli exec --help
          poor-cli task --help
          poor-cli automation --help
          poor-cli skills --help
          poor-cli commands --help
          poor-cli server --help

      - name: Run multiplayer Python tests
        run: |
          python -m unittest tests.test_multiplayer_invites tests.test_multiplayer_host tests.test_multiplayer_session tests.test_multiplayer_runtime tests.test_product_contracts

  python-package:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: macos-13
            python-version: "3.11"
          - os: macos-14
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.11"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Rust TUI
        run: cargo build --manifest-path poor-cli-tui/Cargo.toml --release --locked

      - name: Build Python wheel
        run: python -m build --wheel

      - name: Wheel install smoke test
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import subprocess
          import tempfile
          import venv

          venv_dir = pathlib.Path("wheel-smoke-venv")
          venv.EnvBuilder(with_pip=True, clear=True).create(venv_dir)
          scripts_dir = venv_dir / ("Scripts" if os.name == "nt" else "bin")
          pip = scripts_dir / ("pip.exe" if os.name == "nt" else "pip")
          poor_cli = scripts_dir / ("poor-cli.exe" if os.name == "nt" else "poor-cli")
          poor_cli_server = scripts_dir / ("poor-cli-server.exe" if os.name == "nt" else "poor-cli-server")
          wheel_path = next(pathlib.Path("dist").glob("*.whl"))

          subprocess.check_call([str(pip), "install", "--upgrade", "pip"])
          subprocess.check_call([str(pip), "install", str(wheel_path)])

          with tempfile.TemporaryDirectory() as tmpdir:
              subprocess.check_call([str(poor_cli), "--help"], cwd=tmpdir)
              subprocess.check_call([str(poor_cli), "exec", "--help"], cwd=tmpdir)
              subprocess.check_call([str(poor_cli), "task", "--help"], cwd=tmpdir)
              subprocess.check_call([str(poor_cli), "automation", "--help"], cwd=tmpdir)
              subprocess.check_call([str(poor_cli), "skills", "--help"], cwd=tmpdir)
              subprocess.check_call([str(poor_cli), "commands", "--help"], cwd=tmpdir)
              payload = json.loads(
                  subprocess.check_output(
                      [str(poor_cli), "install-info", "--json"],
                      cwd=tmpdir,
                      text=True,
                  )
              )
              selected = payload.get("selectedLauncher") or {}
              if selected.get("source") != "package":
                  raise SystemExit(f"expected packaged launcher, got {selected!r}")
              subprocess.check_call([str(poor_cli), "tui", "--help"], cwd=tmpdir)
              subprocess.check_call([str(poor_cli_server), "--help"], cwd=tmpdir)
          PY

      - name: Validate Python distributions
        run: twine check dist/*.whl

  python-sdist:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Python source distribution
        run: python -m build --sdist

      - name: Validate source distribution
        run: twine check dist/*.tar.gz

  rust-tui-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test Rust TUI
        run: cargo test --manifest-path poor-cli-tui/Cargo.toml --locked

  lua-syntax:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Validate Neovim plugin Lua syntax
        run: |
          luac5.4 -p nvim-poor-cli/lua/poor-cli/config.lua
          luac5.4 -p nvim-poor-cli/lua/poor-cli/health.lua
          luac5.4 -p nvim-poor-cli/lua/poor-cli/rpc.lua
          luac5.4 -p nvim-poor-cli/lua/poor-cli/commands.lua
          luac5.4 -p nvim-poor-cli/lua/poor-cli/chat.lua

  emacs-client:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Emacs 29
        uses: purcell/setup-emacs@master
        with:
          version: 29.4

      - name: Install Emacs package dependencies
        run: |
          emacs --batch \
            --eval "(require 'package)" \
            --eval "(add-to-list 'package-archives '(\"gnu\" . \"https://elpa.gnu.org/packages/\") t)" \
            --eval "(package-initialize)" \
            --eval "(unless package-archive-contents (package-refresh-contents))" \
            --eval "(dolist (pkg '(markdown-mode transient)) (unless (package-installed-p pkg) (package-install pkg)))"

      - name: Byte-compile Emacs client
        run: |
          emacs --batch -L emacs-poor-cli -L emacs-poor-cli/test \
            -f batch-byte-compile \
            emacs-poor-cli/*.el \
            emacs-poor-cli/test/*.el

      - name: Run Emacs client tests
        run: |
          emacs --batch -L emacs-poor-cli -L emacs-poor-cli/test \
            -l emacs-poor-cli/test/poor-cli-tests.el \
            -f ert-run-tests-batch-and-exit

  docker-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t poor-cli-smoke .

      - name: Verify poor-cli entrypoint
        run: docker run --rm poor-cli-smoke --help
