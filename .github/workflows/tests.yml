name: Poor-CLI Production Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  line-budgets:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check Python line budgets
        run: python3 scripts/check_line_budgets.py

  python-backend-validation:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install multimedia dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg pkg-config libavformat-dev libavcodec-dev libavdevice-dev libavutil-dev libavfilter-dev libswscale-dev libswresample-dev

      - name: Create venv and install Python package/dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -e .

      - name: Run Python backend smoke checks
        run: |
          .venv/bin/python -m compileall poor_cli
          .venv/bin/python -m poor_cli.command_manifest --check
          .venv/bin/poor-cli --help
          .venv/bin/poor-cli exec --help
          .venv/bin/poor-cli task --help
          .venv/bin/poor-cli automation --help
          .venv/bin/poor-cli skills --help
          .venv/bin/poor-cli commands --help
          .venv/bin/poor-cli server --help

      - name: Install test dependencies
        run: .venv/bin/pip install pytest pytest-cov

      - name: Run Python test suite with coverage
        run: |
          .venv/bin/python -m pytest tests/ -x -q --cov=poor_cli --cov-report=term-missing --cov-fail-under=40

  python-package:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: macos-14
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.11"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Python wheel
        run: python -m build --wheel

      - name: Wheel install smoke test
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import subprocess
          import tempfile
          import venv

          venv_dir = pathlib.Path("wheel-smoke-venv").resolve()
          venv.EnvBuilder(with_pip=True, clear=True).create(venv_dir)
          scripts_dir = venv_dir / ("Scripts" if os.name == "nt" else "bin")
          python = scripts_dir / ("python.exe" if os.name == "nt" else "python")
          poor_cli = scripts_dir / ("poor-cli.exe" if os.name == "nt" else "poor-cli")
          poor_cli_server = scripts_dir / ("poor-cli-server.exe" if os.name == "nt" else "poor-cli-server")
          wheel_path = next(pathlib.Path("dist").glob("*.whl"))

          subprocess.check_call([str(python), "-m", "pip", "install", "--upgrade", "pip"])
          subprocess.check_call([str(python), "-m", "pip", "install", str(wheel_path)])

          with tempfile.TemporaryDirectory() as tmpdir:
              subprocess.check_call([str(poor_cli), "--help"], cwd=tmpdir)
              subprocess.check_call([str(poor_cli), "exec", "--help"], cwd=tmpdir)
              subprocess.check_call([str(poor_cli), "task", "--help"], cwd=tmpdir)
              subprocess.check_call([str(poor_cli), "automation", "--help"], cwd=tmpdir)
              subprocess.check_call([str(poor_cli), "skills", "--help"], cwd=tmpdir)
              subprocess.check_call([str(poor_cli), "commands", "--help"], cwd=tmpdir)
              payload = json.loads(
                  subprocess.check_output(
                      [str(poor_cli), "install-info", "--json"],
                      cwd=tmpdir,
                      text=True,
                  )
              )
              selected = payload.get("selectedLauncher") or {}
              if selected.get("source") != "package":
                  raise SystemExit(f"expected packaged launcher, got {selected!r}")
              subprocess.check_call([str(poor_cli_server), "--help"], cwd=tmpdir)
          PY

      - name: Validate Python distributions
        run: twine check dist/*.whl

  python-sdist:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Python source distribution
        run: python -m build --sdist

      - name: Validate source distribution
        run: twine check dist/*.tar.gz

  lua-syntax:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Validate Neovim plugin Lua syntax
        run: |
          luac5.4 -p nvim-poor-cli/lua/poor-cli/config.lua
          luac5.4 -p nvim-poor-cli/lua/poor-cli/health.lua
          luac5.4 -p nvim-poor-cli/lua/poor-cli/rpc.lua
          luac5.4 -p nvim-poor-cli/lua/poor-cli/commands.lua
          luac5.4 -p nvim-poor-cli/lua/poor-cli/chat.lua

  lua-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        neovim-version: ["v0.10.0"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Neovim ${{ matrix.neovim-version }}
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim-version }}

      - name: Check out plenary.nvim
        uses: actions/checkout@v4
        with:
          repository: nvim-lua/plenary.nvim
          path: nvim-poor-cli/.test-runtime/site/pack/test/start/plenary.nvim

      - name: Run Lua specs
        run: PLENARY_DIR="$PWD/nvim-poor-cli/.test-runtime/site/pack/test/start/plenary.nvim" make test-lua

  go-internal-coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go coverage
        run: make coverage

      - name: Run fixture e2e
        run: make test-e2e

      - name: Upload Go coverage report
        uses: actions/upload-artifact@v4
        with:
          name: go-internal-coverage
          path: |
            coverage.out
            coverage.html

  docker-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t poor-cli-smoke .

      - name: Verify poor-cli entrypoint
        run: docker run --rm poor-cli-smoke --help
