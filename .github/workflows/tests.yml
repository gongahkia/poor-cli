name: Poor-CLI Production Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-backend-validation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install multimedia dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg pkg-config libavformat-dev libavcodec-dev libavdevice-dev libavutil-dev libavfilter-dev libswscale-dev libswresample-dev

      - name: Install Python package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Python backend smoke checks
        run: |
          python -m compileall poor_cli
          python -m poor_cli.command_manifest --check
          poor-cli --help
          poor-cli exec --help
          poor-cli task --help
          poor-cli automation --help
          poor-cli skills --help
          poor-cli commands --help
          poor-cli server --help

      - name: Run multiplayer Python tests
        run: |
          python -m unittest tests.test_multiplayer_invites tests.test_multiplayer_host tests.test_multiplayer_session tests.test_multiplayer_runtime tests.test_product_contracts

  python-package:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Python package
        run: python -m build

      - name: Wheel install smoke test
        run: |
          python -m venv /tmp/poor-cli-wheel-smoke
          /tmp/poor-cli-wheel-smoke/bin/pip install --upgrade pip
          /tmp/poor-cli-wheel-smoke/bin/pip install dist/*.whl
          /tmp/poor-cli-wheel-smoke/bin/poor-cli --help
          /tmp/poor-cli-wheel-smoke/bin/poor-cli exec --help
          /tmp/poor-cli-wheel-smoke/bin/poor-cli task --help
          /tmp/poor-cli-wheel-smoke/bin/poor-cli automation --help
          /tmp/poor-cli-wheel-smoke/bin/poor-cli skills --help
          /tmp/poor-cli-wheel-smoke/bin/poor-cli commands --help
          /tmp/poor-cli-wheel-smoke/bin/poor-cli install-info
          /tmp/poor-cli-wheel-smoke/bin/poor-cli-server --help

      - name: Validate Python distributions
        run: twine check dist/*

  rust-tui-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test Rust TUI
        run: cargo test --manifest-path poor-cli-tui/Cargo.toml --locked

  lua-syntax:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Validate Neovim plugin Lua syntax
        run: |
          luac5.4 -p nvim-poor-cli/lua/poor-cli/config.lua
          luac5.4 -p nvim-poor-cli/lua/poor-cli/health.lua
          luac5.4 -p nvim-poor-cli/lua/poor-cli/rpc.lua
          luac5.4 -p nvim-poor-cli/lua/poor-cli/commands.lua
          luac5.4 -p nvim-poor-cli/lua/poor-cli/chat.lua

  emacs-client:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Emacs 29
        uses: purcell/setup-emacs@master
        with:
          version: 29.4

      - name: Install Emacs package dependencies
        run: |
          emacs --batch \
            --eval "(require 'package)" \
            --eval "(add-to-list 'package-archives '(\"gnu\" . \"https://elpa.gnu.org/packages/\") t)" \
            --eval "(package-initialize)" \
            --eval "(unless package-archive-contents (package-refresh-contents))" \
            --eval "(dolist (pkg '(markdown-mode transient)) (unless (package-installed-p pkg) (package-install pkg)))"

      - name: Byte-compile Emacs client
        run: |
          emacs --batch -L emacs-poor-cli -L emacs-poor-cli/test \
            -f batch-byte-compile \
            emacs-poor-cli/*.el \
            emacs-poor-cli/test/*.el

      - name: Run Emacs client tests
        run: |
          emacs --batch -L emacs-poor-cli -L emacs-poor-cli/test \
            -l emacs-poor-cli/test/poor-cli-tests.el \
            -f ert-run-tests-batch-and-exit

  docker-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t poor-cli-smoke .

      - name: Verify poor-cli entrypoint
        run: docker run --rm poor-cli-smoke --help
