name: CI/CD poor-cli tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Python tests for core library
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Server stdio initialize/shutdown smoke test
        run: |
          python - <<'PY'
          import json
          import subprocess

          proc = subprocess.Popen(
              ["python", "-m", "poor_cli.server", "--stdio"],
              stdin=subprocess.PIPE,
              stdout=subprocess.PIPE,
              stderr=subprocess.PIPE,
          )

          def send(message):
              body = json.dumps(message).encode("utf-8")
              header = f"Content-Length: {len(body)}\r\n\r\n".encode("utf-8")
              proc.stdin.write(header + body)
              proc.stdin.flush()

          def read_message():
              header = b""
              while b"\r\n\r\n" not in header:
                  chunk = proc.stdout.read(1)
                  if not chunk:
                      raise RuntimeError("Unexpected EOF while reading response headers")
                  header += chunk

              header_text, _, body_prefix = header.partition(b"\r\n\r\n")
              content_length = 0
              for line in header_text.decode("utf-8").split("\r\n"):
                  if line.lower().startswith("content-length:"):
                      content_length = int(line.split(":", 1)[1].strip())
                      break

              if content_length <= 0:
                  raise RuntimeError("Missing or invalid Content-Length in response")

              body = body_prefix
              while len(body) < content_length:
                  chunk = proc.stdout.read(content_length - len(body))
                  if not chunk:
                      raise RuntimeError("Unexpected EOF while reading response body")
                  body += chunk

              return json.loads(body[:content_length].decode("utf-8"))

          send(
              {
                  "jsonrpc": "2.0",
                  "id": 1,
                  "method": "initialize",
                  "params": {"permissionMode": "prompt"},
              }
          )
          init_response = read_message()
          assert init_response.get("id") == 1, f"initialize response id mismatch: {init_response}"

          send({"jsonrpc": "2.0", "id": 2, "method": "shutdown", "params": {}})
          shutdown_response = read_message()
          assert shutdown_response.get("id") == 2, f"shutdown response id mismatch: {shutdown_response}"
          assert "error" not in shutdown_response, f"shutdown failed: {shutdown_response}"

          proc.wait(timeout=10)
          if proc.returncode not in (0, None):
              stderr_text = proc.stderr.read().decode("utf-8", errors="replace")
              raise RuntimeError(f"Server exited with status {proc.returncode}: {stderr_text}")
          PY

      - name: Run linting
        run: |
          pip install ruff
          ruff check poor_cli tests

      - name: Run Python tests
        run: |
          pytest tests/ -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # Neovim plugin tests
  neovim-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        neovim-version: ["stable", "nightly"]

    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim-version }}

      - name: Install plenary.nvim
        run: |
          mkdir -p ~/.local/share/nvim/site/pack/vendor/start
          git clone --depth 1 https://github.com/nvim-lua/plenary.nvim \
            ~/.local/share/nvim/site/pack/vendor/start/plenary.nvim

      - name: Install plugin
        run: |
          mkdir -p ~/.local/share/nvim/site/pack/poor-cli/start
          cp -r nvim-poor-cli ~/.local/share/nvim/site/pack/poor-cli/start/

      - name: Run Neovim tests
        run: |
          nvim --headless -u nvim-poor-cli/tests/minimal_init.lua \
            -c "PlenaryBustedDirectory nvim-poor-cli/tests/ {minimal_init = 'nvim-poor-cli/tests/minimal_init.lua'}"

  # Type checking
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install mypy types-PyYAML types-aiofiles

      - name: Run mypy
        run: |
          mypy poor_cli --no-error-summary

  # Build check
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*
