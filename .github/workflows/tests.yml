name: Poor-CLI CI/CD Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Python tests for core library
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Server stdio initialize/shutdown smoke test
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 2
          max_attempts: 3
          retry_wait_seconds: 5
          command: python scripts/server_stdio_smoke.py python -m poor_cli.server --stdio

      - name: Run linting
        run: |
          pip install ruff
          ruff check poor_cli tests --select E9,F63,F7,F82 --target-version py39

      - name: Report import graph reachability
        run: |
          python scripts/import_graph_check.py

      - name: Run Python tests
        run: |
          pytest tests/ -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  rust-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: cargo test --manifest-path poor-cli-tui/Cargo.toml

  # Neovim plugin tests
  neovim-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        neovim-version: ["stable", "nightly"]

    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim-version }}

      - name: Install plenary.nvim
        run: |
          mkdir -p ~/.local/share/nvim/site/pack/vendor/start
          git clone --depth 1 https://github.com/nvim-lua/plenary.nvim \
            ~/.local/share/nvim/site/pack/vendor/start/plenary.nvim

      - name: Install plugin
        run: |
          mkdir -p ~/.local/share/nvim/site/pack/poor-cli/start
          cp -r nvim-poor-cli ~/.local/share/nvim/site/pack/poor-cli/start/

      - name: Run Neovim tests
        run: |
          nvim --headless -u nvim-poor-cli/tests/minimal_init.lua \
            -c "PlenaryBustedDirectory nvim-poor-cli/tests/ {minimal_init = 'nvim-poor-cli/tests/minimal_init.lua'}"

  # Type checking
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install mypy

      - name: Run mypy baseline
        run: |
          mypy \
            --config-file .github/mypy-ci.ini \
            poor_cli/__main__.py \
            poor_cli/prompts.py \
            poor_cli/web_search.py \
            poor_cli/command_validator.py \
            --no-error-summary

  # Build check
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Wheel install smoke test
        run: |
          python -m venv /tmp/poor-cli-wheel-smoke
          /tmp/poor-cli-wheel-smoke/bin/pip install --upgrade pip
          /tmp/poor-cli-wheel-smoke/bin/pip install dist/*.whl
          /tmp/poor-cli-wheel-smoke/bin/python scripts/server_stdio_smoke.py /tmp/poor-cli-wheel-smoke/bin/poor-cli-server --stdio

      - name: Check package
        run: twine check dist/*

  docker-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t poor-cli-smoke .

      - name: Verify poor-cli entrypoint
        run: docker run --rm poor-cli-smoke --help
