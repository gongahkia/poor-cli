name: poor-cli GitHub task example

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Sandbox preset for the generated task
        required: true
        default: review-only
      wait_timeout_seconds:
        description: How long to wait for task completion
        required: true
        default: "900"
  pull_request:
  issues:
    types: [opened, edited, reopened]

jobs:
  poor-cli-github-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install poor-cli
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Create and run GitHub task
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          MODE="read-only"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            MODE="review-only"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.mode }}" ]; then
            MODE="${{ inputs.mode }}"
          fi
          TIMEOUT="${{ inputs.wait_timeout_seconds }}"
          if [ -z "$TIMEOUT" ]; then
            TIMEOUT="900"
          fi
          poor-cli github-task create \
            --event-path "$GITHUB_EVENT_PATH" \
            --mode "$MODE" \
            --wait \
            --wait-timeout-seconds "$TIMEOUT" \
            --json > poor-cli-task.json
          cat poor-cli-task.json

      - name: Show task response
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("poor-cli-task.json").read_text(encoding="utf-8"))
          response_path = Path(payload["task"]["responsePath"])
          if response_path.exists():
              print(response_path.read_text(encoding="utf-8"))
          else:
              print(f"No response found at {response_path}")
          PY

      - name: Upload task artifacts
        uses: actions/upload-artifact@v4
        with:
          name: poor-cli-task
          path: |
            poor-cli-task.json
            .poor-cli/tasks
