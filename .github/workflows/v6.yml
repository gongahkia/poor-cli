name: v6 gates

on:
  push:
    branches: ["v6/**"]
  pull_request:
    branches: ["main", "v6/**"]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install build
      - name: Graph dependency gate
        run: |
          poor-cli doctor | tee doctor.txt
          grep -q "graph:python: ok" doctor.txt
          grep -q "graph:javascript: ok" doctor.txt
          grep -q "graph:typescript: ok" doctor.txt
      - name: Lint
        run: ruff check src/poor_cli tests bench/loc_gate.py bench/packaging_gate.py bench/replay_determinism_gate.py bench/phase1_acceptance.py bench/graph_vs_grep.py bench/phase3_readiness.py bench/phase3_acceptance.py bench/phase3_closeout.py bench/phase3_demo.py bench/phase3_local_benchmark.py bench/pivot_remaining.py
      - name: Format
        run: ruff format --check src/poor_cli tests bench/loc_gate.py bench/packaging_gate.py bench/replay_determinism_gate.py bench/phase1_acceptance.py bench/graph_vs_grep.py bench/phase3_readiness.py bench/phase3_acceptance.py bench/phase3_closeout.py bench/phase3_demo.py bench/phase3_local_benchmark.py bench/pivot_remaining.py
      - name: Type check
        run: mypy --strict src/poor_cli
      - name: Test
        run: python -m pytest --cov=src/poor_cli --cov-fail-under=60 tests/
      - name: Fake provider tests
        run: python -m pytest tests/test_provider_adapters.py tests/test_providers.py tests/test_native_runner.py
      - name: Replay determinism
        run: python bench/replay_determinism_gate.py
      - name: LOC gate
        run: python bench/loc_gate.py
      - name: Packaging
        run: python bench/packaging_gate.py
      - name: Docs
        run: |
          python -m pip install mkdocs mkdocs-material
          mkdocs build --strict
