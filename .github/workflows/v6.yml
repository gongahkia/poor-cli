name: v6 gates

on:
  push:
    branches: ["v6/**"]
  pull_request:
    branches: ["main", "v6/**"]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/poor_cli tests bench/loc_gate.py
      - name: Format
        run: ruff format --check src/poor_cli tests bench/loc_gate.py
      - name: Type check
        run: mypy --strict src/poor_cli
      - name: Test
        run: python -m pytest --cov=src/poor_cli --cov-fail-under=60 tests/
      - name: LOC gate
        run: python bench/loc_gate.py
      - name: Docs
        run: |
          python -m pip install mkdocs mkdocs-material
          mkdocs build --strict
