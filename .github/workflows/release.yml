name: Poor-CLI Release on push

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  integration:
    name: Integration Tests
    uses: ./.github/workflows/tests.yml

  build:
    name: Build Package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate tag version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(python - <<'PY'
          import poor_cli
          print(poor_cli.__version__)
          PY
          )"

          if [[ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match poor_cli.__version__ ${PACKAGE_VERSION}"
            exit 1
          fi

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build package
        run: python -m build --sdist

      - name: Check package metadata
        run: twine check dist/*.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  wheels:
    name: Build Wheel (${{ matrix.asset_suffix }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_suffix: linux-x86_64
          - os: macos-14
            asset_suffix: macos-arm64
          - os: windows-latest
            asset_suffix: windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build Rust TUI
        run: cargo build --manifest-path poor-cli-tui/Cargo.toml --release --locked

      - name: Build wheel
        run: python -m build --wheel

      - name: Validate wheel
        run: twine check dist/*.whl

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.asset_suffix }}
          path: dist/*.whl
          if-no-files-found: error

  tui-binaries:
    name: Build TUI (${{ matrix.asset_suffix }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_suffix: linux-x86_64
            archive_format: tar.gz
            binary_name: poor-cli-tui
          - os: macos-14
            asset_suffix: macos-arm64
            archive_format: tar.gz
            binary_name: poor-cli-tui
          - os: windows-latest
            asset_suffix: windows-x86_64
            archive_format: zip
            binary_name: poor-cli-tui.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust TUI
        run: cargo build --manifest-path poor-cli-tui/Cargo.toml --release --locked

      - name: Package release archive
        shell: bash
        env:
          ARCHIVE_FORMAT: ${{ matrix.archive_format }}
          ASSET_SUFFIX: ${{ matrix.asset_suffix }}
          BINARY_NAME: ${{ matrix.binary_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          python - <<'PY'
          import hashlib
          import os
          import tarfile
          import zipfile
          from pathlib import Path

          archive_format = os.environ["ARCHIVE_FORMAT"]
          asset_suffix = os.environ["ASSET_SUFFIX"]
          binary_name = os.environ["BINARY_NAME"]
          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          ref_value = os.environ.get("GITHUB_REF", "")
          run_number = os.environ.get("GITHUB_RUN_NUMBER", "local")

          release_label = ref_name if ref_value.startswith("refs/tags/") else f"snapshot-{run_number}"
          binary_path = Path("poor-cli-tui") / "target" / "release" / binary_name
          if not binary_path.is_file():
              raise SystemExit(f"Missing built binary: {binary_path}")

          output_dir = Path("release-artifacts")
          output_dir.mkdir(parents=True, exist_ok=True)

          if archive_format == "zip":
              archive_name = f"poor-cli-tui-{release_label}-{asset_suffix}.zip"
              archive_path = output_dir / archive_name
              with zipfile.ZipFile(archive_path, "w", compression=zipfile.ZIP_DEFLATED) as bundle:
                  bundle.write(binary_path, arcname=binary_name)
          else:
              archive_name = f"poor-cli-tui-{release_label}-{asset_suffix}.tar.gz"
              archive_path = output_dir / archive_name
              with tarfile.open(archive_path, "w:gz") as bundle:
                  bundle.add(binary_path, arcname=binary_name)

          digest = hashlib.sha256(archive_path.read_bytes()).hexdigest()
          checksum_path = output_dir / f"{archive_name}.sha256"
          checksum_path.write_text(f"{digest}  {archive_name}\n", encoding="utf-8")
          PY

      - name: Upload TUI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tui-${{ matrix.asset_suffix }}
          path: release-artifacts/*
          if-no-files-found: error

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [integration]
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-release:
    name: Publish GitHub Release
    needs:
      - integration
      - build
      - wheels
      - tui-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Build consolidated checksums
        run: |
          cat release-assets/*.sha256 > release-assets/SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [integration, build]
    environment:
      name: pypi
      url: https://pypi.org/project/poor-cli/
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
