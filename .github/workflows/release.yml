name: Poor-CLI Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  python-multiplayer-tests:
    name: Multiplayer Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install multimedia dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg pkg-config libavformat-dev libavcodec-dev libavdevice-dev libavutil-dev libavfilter-dev libswscale-dev libswresample-dev

      - name: Install Python package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run multiplayer Python tests
        run: |
          python -m unittest tests.test_multiplayer_invites tests.test_multiplayer_host tests.test_multiplayer_session tests.test_multiplayer_runtime

  python-sdist:
    name: Build Python Source Distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build source distribution
        run: python -m build --sdist

      - name: Validate distributions
        run: twine check dist/*.tar.gz

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  python-wheels:
    name: Build Python Wheel (${{ matrix.asset_suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_suffix: linux-x86_64
          - os: macos-13
            asset_suffix: macos-x86_64
          - os: macos-14
            asset_suffix: macos-arm64
          - os: windows-latest
            asset_suffix: windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust TUI
        run: cargo build --manifest-path poor-cli-tui/Cargo.toml --release --locked

      - name: Build wheel
        run: python -m build --wheel

      - name: Validate wheel
        run: twine check dist/*.whl

      - name: Upload Python wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.asset_suffix }}
          path: dist/*.whl
          if-no-files-found: error

  tui-binaries:
    name: Build TUI (${{ matrix.asset_suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_suffix: linux-x86_64
            archive_format: tar.gz
            binary_name: poor-cli-tui
          - os: macos-13
            asset_suffix: macos-x86_64
            archive_format: tar.gz
            binary_name: poor-cli-tui
          - os: macos-14
            asset_suffix: macos-arm64
            archive_format: tar.gz
            binary_name: poor-cli-tui
          - os: windows-latest
            asset_suffix: windows-x86_64
            archive_format: zip
            binary_name: poor-cli-tui.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust TUI
        run: cargo build --manifest-path poor-cli-tui/Cargo.toml --release --locked

      - name: Package release archive
        env:
          ARCHIVE_FORMAT: ${{ matrix.archive_format }}
          ASSET_SUFFIX: ${{ matrix.asset_suffix }}
          BINARY_NAME: ${{ matrix.binary_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          python - <<'PY'
          import hashlib
          import os
          import tarfile
          import zipfile
          from pathlib import Path

          archive_format = os.environ["ARCHIVE_FORMAT"]
          asset_suffix = os.environ["ASSET_SUFFIX"]
          binary_name = os.environ["BINARY_NAME"]
          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          ref_value = os.environ.get("GITHUB_REF", "")
          run_number = os.environ.get("GITHUB_RUN_NUMBER", "local")

          release_label = ref_name if ref_value.startswith("refs/tags/") else f"snapshot-{run_number}"
          binary_path = Path("poor-cli-tui") / "target" / "release" / binary_name
          if not binary_path.is_file():
              raise SystemExit(f"Missing built binary: {binary_path}")

          output_dir = Path("release-artifacts")
          output_dir.mkdir(parents=True, exist_ok=True)

          if archive_format == "zip":
              archive_name = f"poor-cli-tui-{release_label}-{asset_suffix}.zip"
              archive_path = output_dir / archive_name
              with zipfile.ZipFile(archive_path, "w", compression=zipfile.ZIP_DEFLATED) as bundle:
                  bundle.write(binary_path, arcname=binary_name)
          else:
              archive_name = f"poor-cli-tui-{release_label}-{asset_suffix}.tar.gz"
              archive_path = output_dir / archive_name
              with tarfile.open(archive_path, "w:gz") as bundle:
                  bundle.add(binary_path, arcname=binary_name)

          digest = hashlib.sha256(archive_path.read_bytes()).hexdigest()
          checksum_path = output_dir / f"{archive_name}.sha256"
          checksum_path.write_text(f"{digest}  {archive_name}\n", encoding="utf-8")
          PY

      - name: Upload TUI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tui-${{ matrix.asset_suffix }}
          path: release-artifacts/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - python-multiplayer-tests
      - python-sdist
      - python-wheels
      - tui-binaries
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Build consolidated checksums
        run: |
          cat release-assets/*.sha256 > release-assets/SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
