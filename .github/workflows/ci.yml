name: poor-cli v6 ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Smoke
        run: |
          python -m compileall src/poor_cli
          poor-cli --version
          poor-cli --help
          poor-cli agents
      - name: Lint
        run: ruff check src/poor_cli tests bench/loc_gate.py bench/phase1_acceptance.py bench/graph_vs_grep.py bench/phase3_readiness.py bench/pivot_remaining.py
      - name: Format
        run: ruff format --check src/poor_cli tests bench/loc_gate.py bench/phase1_acceptance.py bench/graph_vs_grep.py bench/phase3_readiness.py bench/pivot_remaining.py
      - name: Type check
        run: mypy --strict src/poor_cli
      - name: Test
        run: python -m pytest --cov=src/poor_cli --cov-fail-under=60 tests/
      - name: LOC gate
        run: python bench/loc_gate.py
      - name: Docs
        run: |
          python -m pip install mkdocs mkdocs-material
          mkdocs build --strict
