name: Seuss CI/CD on push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.6"
          cabal-version: "3.10.3.0"

      - name: Update package index
        run: cabal update

      - name: Build
        run: cabal build all

      - name: Run tests
        run: cabal test all

      - name: Smoke test — version
        run: cabal run seuss -- --help

      - name: Smoke test — check example
        run: cabal run seuss -- check examples/lotr.seuss

      - name: Smoke test — export SVG
        run: cabal run seuss -- export examples/lotr.seuss -f svg -o /tmp/lotr.svg && test -s /tmp/lotr.svg

      - name: Smoke test — reject bad format
        run: |
          if cabal run seuss -- export examples/lotr.seuss -f json 2>/dev/null; then
            echo "Expected failure for unsupported format" && exit 1
          fi
