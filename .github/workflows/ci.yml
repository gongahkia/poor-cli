name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy -- -W warnings

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Smoke test — version
        run: ./target/release/seuss --version

      - name: Smoke test — check example
        run: ./target/release/seuss check examples/lotr.seuss

      - name: Smoke test — export SVG
        run: ./target/release/seuss export examples/lotr.seuss -f svg -o /tmp/lotr.svg && test -s /tmp/lotr.svg

      - name: Smoke test — reject bad format
        run: |
          if ./target/release/seuss export examples/lotr.seuss -f json 2>/dev/null; then
            echo "Expected failure for unsupported format" && exit 1
          fi
