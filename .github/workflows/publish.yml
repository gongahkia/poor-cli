name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify repository
        run: npm run verify
        env:
          SG_APIS_LOG_LEVEL: error

  publish-npm:
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Publish @sg-apis/shared
        run: npm publish --workspace packages/shared --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish sg-apis-mcp
        run: npm publish --workspace packages/mcp-server --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Registry smoke
        run: npm run test:smoke:registry
        env:
          SG_APIS_LOG_LEVEL: error

  publish-ghcr:
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tags
        id: tags
        run: |
          REF_NAME="${GITHUB_REF_NAME:-manual}"
          SANITIZED="$(echo "$REF_NAME" | tr '[:upper:]' '[:lower:]' | tr '/' '-')"
          echo "tag=${SANITIZED}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sg-apis-mcp:${{ steps.tags.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/sg-apis-mcp:latest

      - name: Container smoke
        run: npm run test:smoke:container
        env:
          SG_APIS_CONTAINER_IMAGE: ghcr.io/${{ github.repository_owner }}/sg-apis-mcp:${{ steps.tags.outputs.tag }}
