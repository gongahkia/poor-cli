<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>haus — Select Model</title>
<style>
:root {
  --font-display: "Neue Haas Grotesk Display", "NeueHaasGrotesk", "Helvetica Neue", Arial, sans-serif;
  --font-ui: "Inter Variable", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --bg: #000000; --surface: #061A1C; --input-bg: #061A1C;
  --fg: #FFFFFF; --fg-dim: #FFFFFF; --fg-muted: #9DABAD; --fg-faint: #637174;
  --primary: #FFFFFF; --primary-60: #9DABAD; --primary-80: #E9F0F1; --chip-bg: rgba(157,171,173,0.10);
  --border: #1E2C31; --border-mid: rgba(157,171,173,0.32);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-ui); background: var(--bg); color: var(--fg); min-height: 100vh; letter-spacing: 0; }
header {
  padding: 80px 50px 32px; border-bottom: 1px solid var(--border);
}
header h1 { font-family: var(--font-display); font-size: clamp(48px, 8vw, 96px); line-height: 1; font-weight: 400; letter-spacing: 0; }
header p { font-size: 18px; line-height: 28px; color: var(--fg-muted); margin-top: 16px; max-width: 680px; }
.toolbar {
  padding: 16px 50px; display: flex; gap: 12px; align-items: center;
  border-bottom: 1px solid var(--border);
}
.toolbar label, .toolbar button {
  min-height: 56px; padding: 12px 24px; background: transparent; border: 1px solid var(--border-mid);
  border-radius: 9999px; cursor: pointer; font-size: 16px; line-height: 22px; color: var(--fg);
  font-weight: 550;
}
.toolbar button { background: var(--primary); color: #000000; border-color: var(--primary); }
.toolbar label:hover { background: var(--chip-bg); border-color: var(--primary); color: var(--fg); }
.toolbar button:hover { background: var(--primary-80); border-color: var(--primary-80); }
.toolbar input[type="file"] { display: none; }
#grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 32px; padding: 32px 50px;
}
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.15s, background-color 0.15s;
}
.card:hover { border-color: var(--primary); transform: translateY(-2px); background: #0B2427; }
.card img {
  width: 100%; height: 180px; object-fit: contain; background: var(--input-bg);
  border-bottom: 1px solid var(--border);
}
.card .no-thumb {
  width: 100%; height: 180px; display: flex; align-items: center;
  justify-content: center; background: var(--input-bg); border-bottom: 1px solid var(--border);
  color: var(--fg-faint); font-size: 14px;
}
.card-body { padding: 32px; }
.card-body h3 { font-family: var(--font-display); font-size: 24px; line-height: 32px; font-weight: 330; margin-bottom: 8px; }
.card-body .meta { font-size: 14px; color: var(--fg-muted); line-height: 1.6; }
.card-body .meta span { color: var(--primary-60); }
#empty {
  padding: 80px 50px; text-align: center; color: var(--fg-faint); font-size: 16px;
  display: none;
}
#empty code {
  background: var(--input-bg); border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; font-size: 13px;
}
.or-divider { color: var(--fg-faint); font-size: 12px; }
@media (max-width: 720px) {
  header { padding: 50px 24px 24px; }
  .toolbar { padding: 16px 24px; flex-wrap: wrap; }
  #grid { padding: 24px; gap: 20px; }
}
</style>
</head>
<body>
<header>
  <h1>haus</h1>
  <p>Open the editor, upload a floor plan image, or load an existing GLB model.</p>
</header>
<div class="toolbar">
  <label>Load GLB from disk <input type="file" id="glb-upload" accept=".glb"></label>
  <span class="or-divider">|</span>
  <button id="open-empty">Open editor</button>
</div>
<div id="grid"></div>
<div id="empty">
  <p>No sample models found.</p>
  <p style="margin-top:8px;">Open the editor and upload a PNG/JPG floor plan.</p>
</div>
<script>
const grid = document.getElementById('grid');
const empty = document.getElementById('empty');

fetch('./manifest.json')
  .then(r => r.json())
  .then(models => {
    if (!models.length) { empty.style.display = ''; return; }
    for (const m of models) {
      const card = document.createElement('div');
      card.className = 'card';
      card.addEventListener('click', () => {
        window.location.href = 'editor.html?glb=' + encodeURIComponent(m.glb);
      });
      let thumbHtml;
      if (m.thumb) {
        thumbHtml = `<img src="${m.thumb}" alt="${m.name}">`;
      } else {
        thumbHtml = `<div class="no-thumb">No preview</div>`;
      }
      let metaHtml = '';
      if (m.walls !== undefined) metaHtml += `<span>${m.walls}</span> walls `;
      if (m.columns !== undefined) metaHtml += `<span>${m.columns}</span> columns `;
      if (m.openings !== undefined) metaHtml += `<span>${m.openings}</span> openings `;
      if (m.scale) metaHtml += `<br>scale: <span>${m.scale}</span> m/px`;
      if (m.source) metaHtml += `<br>source: ${m.source}`;
      card.innerHTML = `${thumbHtml}<div class="card-body"><h3>${m.name}</h3><div class="meta">${metaHtml}</div></div>`;
      grid.appendChild(card);
    }
  })
  .catch(() => { empty.style.display = ''; });

document.getElementById('glb-upload').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  window.location.href = 'editor.html?glb=' + encodeURIComponent(url);
});

document.getElementById('open-empty').addEventListener('click', () => {
  window.location.href = 'editor.html';
});
</script>
</body>
</html>
