<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>haus — Select Model</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #eee; min-height: 100vh; }
header {
  padding: 32px 40px 24px; border-bottom: 1px solid #333;
}
header h1 { font-size: 24px; font-weight: 600; letter-spacing: 1px; }
header p { font-size: 13px; color: #888; margin-top: 4px; }
.toolbar {
  padding: 16px 40px; display: flex; gap: 12px; align-items: center;
  border-bottom: 1px solid #2a2a2a;
}
.toolbar label, .toolbar button {
  padding: 6px 14px; background: #333; border: 1px solid #555;
  border-radius: 4px; cursor: pointer; font-size: 12px; color: #ddd;
}
.toolbar label:hover, .toolbar button:hover { background: #444; }
.toolbar input[type="file"] { display: none; }
#grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px; padding: 24px 40px;
}
.card {
  background: #252525; border: 1px solid #333; border-radius: 8px;
  overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.15s;
}
.card:hover { border-color: #5a9; transform: translateY(-2px); }
.card img {
  width: 100%; height: 180px; object-fit: contain; background: #1e1e1e;
  border-bottom: 1px solid #333;
}
.card .no-thumb {
  width: 100%; height: 180px; display: flex; align-items: center;
  justify-content: center; background: #1e1e1e; border-bottom: 1px solid #333;
  color: #555; font-size: 13px;
}
.card-body { padding: 14px 16px; }
.card-body h3 { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
.card-body .meta { font-size: 11px; color: #888; line-height: 1.6; }
.card-body .meta span { color: #5a9; }
#empty {
  padding: 60px 40px; text-align: center; color: #666; font-size: 14px;
  display: none;
}
#empty code {
  background: #333; padding: 2px 8px; border-radius: 3px; font-size: 13px;
}
.or-divider { color: #555; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>haus</h1>
  <p>Select a floor plan model to open in the editor, or load a GLB file directly.</p>
</header>
<div class="toolbar">
  <label>Load GLB from disk <input type="file" id="glb-upload" accept=".glb"></label>
  <span class="or-divider">|</span>
  <button id="open-empty">Open empty editor</button>
</div>
<div id="grid"></div>
<div id="empty">
  <p>No models found.</p>
  <p style="margin-top:8px;">Run <code>make build</code> to generate models from floor plan images in <code>corpus/</code>.</p>
</div>
<script>
const grid = document.getElementById('grid');
const empty = document.getElementById('empty');

fetch('./manifest.json')
  .then(r => r.json())
  .then(models => {
    if (!models.length) { empty.style.display = ''; return; }
    for (const m of models) {
      const card = document.createElement('div');
      card.className = 'card';
      card.addEventListener('click', () => {
        window.location.href = 'editor.html?glb=' + encodeURIComponent(m.glb);
      });
      let thumbHtml;
      if (m.thumb) {
        thumbHtml = `<img src="${m.thumb}" alt="${m.name}">`;
      } else {
        thumbHtml = `<div class="no-thumb">No preview</div>`;
      }
      let metaHtml = '';
      if (m.walls !== undefined) metaHtml += `<span>${m.walls}</span> walls `;
      if (m.columns !== undefined) metaHtml += `<span>${m.columns}</span> columns `;
      if (m.openings !== undefined) metaHtml += `<span>${m.openings}</span> openings `;
      if (m.scale) metaHtml += `<br>scale: <span>${m.scale}</span> m/px`;
      if (m.source) metaHtml += `<br>source: ${m.source}`;
      card.innerHTML = `${thumbHtml}<div class="card-body"><h3>${m.name}</h3><div class="meta">${metaHtml}</div></div>`;
      grid.appendChild(card);
    }
  })
  .catch(() => { empty.style.display = ''; });

document.getElementById('glb-upload').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  window.location.href = 'editor.html?glb=' + encodeURIComponent(url);
});

document.getElementById('open-empty').addEventListener('click', () => {
  window.location.href = 'editor.html';
});
</script>
</body>
</html>
