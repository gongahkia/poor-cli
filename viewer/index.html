<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>haus — Floor Plan Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: system-ui, sans-serif; background: #1a1a1a; color: #eee; }
canvas { display: block; }
#sidebar {
  position: fixed; top: 0; right: 0; width: 200px; height: 100%;
  background: rgba(30,30,30,0.95); padding: 12px; z-index: 10;
  border-left: 1px solid #333; overflow-y: auto;
}
#sidebar h3 { font-size: 13px; margin-bottom: 8px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
.furniture-btn {
  display: block; width: 100%; padding: 8px 10px; margin-bottom: 6px;
  background: #2a2a2a; border: 1px solid #444; color: #ddd; cursor: pointer;
  font-size: 12px; text-align: left; border-radius: 4px;
}
.furniture-btn:hover { background: #3a3a3a; border-color: #666; }
#file-input-wrap {
  position: fixed; top: 12px; left: 12px; z-index: 10;
}
#file-input-wrap label {
  display: inline-block; padding: 6px 14px; background: #333; border: 1px solid #555;
  border-radius: 4px; cursor: pointer; font-size: 12px;
}
#file-input-wrap label:hover { background: #444; }
#file-input-wrap input { display: none; }
#info {
  position: fixed; bottom: 12px; left: 12px; z-index: 10;
  font-size: 11px; color: #666;
}
</style>
</head>
<body>
<div id="file-input-wrap">
  <label>Load GLB <input type="file" id="glb-input" accept=".glb"></label>
</div>
<div id="sidebar">
  <h3>Furniture</h3>
  <button class="furniture-btn" data-type="bed">Bed (2.0 x 1.5m)</button>
  <button class="furniture-btn" data-type="sofa">Sofa (2.0 x 0.8m)</button>
  <button class="furniture-btn" data-type="dining">Dining Table (1.2 x 0.8m)</button>
  <button class="furniture-btn" data-type="desk">Desk (1.2 x 0.6m)</button>
  <button class="furniture-btn" data-type="wardrobe">Wardrobe (1.8 x 0.6m)</button>
</div>
<div id="info">Orbit: left-drag | Pan: right-drag | Zoom: scroll</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DragControls } from 'three/addons/controls/DragControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);

const camera = new THREE.PerspectiveCamera(50, (window.innerWidth - 200) / window.innerHeight, 0.1, 500);
camera.position.set(10, 8, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth - 200, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.prepend(renderer.domElement);

const orbit = new OrbitControls(camera, renderer.domElement);
orbit.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 15, 10);
scene.add(dirLight);

const grid = new THREE.GridHelper(50, 50, 0x444444, 0x333333);
scene.add(grid);

const loader = new GLTFLoader();
let currentModel = null;

function loadGLB(url) {
  if (currentModel) { scene.remove(currentModel); }
  loader.load(url, (gltf) => {
    currentModel = gltf.scene;
    scene.add(currentModel);
    const box = new THREE.Box3().setFromObject(currentModel);
    const center = box.getCenter(new THREE.Vector3());
    orbit.target.copy(center);
    camera.position.set(center.x + 10, center.y + 8, center.z + 10);
    orbit.update();
  });
}

// try loading default model.glb
loader.load('./model.glb', (gltf) => {
  currentModel = gltf.scene;
  scene.add(currentModel);
  const box = new THREE.Box3().setFromObject(currentModel);
  const center = box.getCenter(new THREE.Vector3());
  orbit.target.copy(center);
  camera.position.set(center.x + 10, center.y + 8, center.z + 10);
  orbit.update();
}, undefined, () => {}); // silently ignore if not found

document.getElementById('glb-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  loadGLB(url);
});

// furniture
const FURNITURE = {
  bed:      { w: 2.0, h: 0.6, d: 1.5, color: 0x88bbee, label: 'Bed' },
  sofa:     { w: 2.0, h: 0.8, d: 0.8, color: 0x555555, label: 'Sofa' },
  dining:   { w: 1.2, h: 0.75, d: 0.8, color: 0x8B6914, label: 'Dining' },
  desk:     { w: 1.2, h: 0.75, d: 0.6, color: 0xD2B48C, label: 'Desk' },
  wardrobe: { w: 1.8, h: 2.0, d: 0.6, color: 0x4A3728, label: 'Wardrobe' },
};

const draggables = [];
const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let dragTarget = null;
let dragOffset = new THREE.Vector3();

document.querySelectorAll('.furniture-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const type = btn.dataset.type;
    const f = FURNITURE[type];
    const geo = new THREE.BoxGeometry(f.w, f.h, f.d);
    const mat = new THREE.MeshLambertMaterial({ color: f.color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(0, f.h / 2, 0);
    mesh.userData.draggable = true;
    scene.add(mesh);
    draggables.push(mesh);
  });
});

renderer.domElement.addEventListener('pointerdown', (e) => {
  if (e.button !== 0) return;
  mouse.x = (e.clientX / (window.innerWidth - 200)) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(draggables);
  if (hits.length > 0) {
    dragTarget = hits[0].object;
    orbit.enabled = false;
    const intersection = new THREE.Vector3();
    raycaster.ray.intersectPlane(plane, intersection);
    dragOffset.copy(dragTarget.position).sub(intersection);
  }
});

renderer.domElement.addEventListener('pointermove', (e) => {
  if (!dragTarget) return;
  mouse.x = (e.clientX / (window.innerWidth - 200)) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersection = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, intersection);
  dragTarget.position.x = intersection.x + dragOffset.x;
  dragTarget.position.z = intersection.z + dragOffset.z;
});

renderer.domElement.addEventListener('pointerup', () => {
  dragTarget = null;
  orbit.enabled = true;
});

window.addEventListener('resize', () => {
  camera.aspect = (window.innerWidth - 200) / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth - 200, window.innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  orbit.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
