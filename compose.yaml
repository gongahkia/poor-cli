services:
  dude-assets:
    image: ghcr.io/gongahkia/sg-apis-mcp:${SG_APIS_IMAGE_TAG:-latest}
    restart: "no"
    entrypoint: ["sh", "-lc"]
    command: ["rm -rf /srv/dude/* && cp -R /app/apps/web/dist/. /srv/dude/"]
    volumes:
      - dude_web_assets:/srv/dude

  dude-gateway:
    image: ghcr.io/gongahkia/sg-apis-mcp:${SG_APIS_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DUDE_WEB_ORIGIN_ALLOWLIST: ${DUDE_WEB_ORIGIN_ALLOWLIST:-}
      SG_APIS_TOOLSETS: ${SG_APIS_TOOLSETS:-public,briefs,query,health,ops}
      SG_APIS_LOG_LEVEL: ${SG_APIS_LOG_LEVEL:-info}
      SG_APIS_STATE_DIR: /var/lib/sg-apis
      SG_API_ONEMAP_EMAIL: ${SG_API_ONEMAP_EMAIL:-}
      SG_API_ONEMAP_PASSWORD: ${SG_API_ONEMAP_PASSWORD:-}
      SG_API_URA_KEY: ${SG_API_URA_KEY:-}
      SG_API_LTA_KEY: ${SG_API_LTA_KEY:-}
      TINYFISH_API_KEY: ${TINYFISH_API_KEY:-}
      DUDE_AI_PROVIDER: ${DUDE_AI_PROVIDER:-openai}
      DUDE_AI_MODEL: ${DUDE_AI_MODEL:-}
      DUDE_OPENAI_MODEL: ${DUDE_OPENAI_MODEL:-}
      DUDE_ANTHROPIC_MODEL: ${DUDE_ANTHROPIC_MODEL:-}
      DUDE_GOOGLE_MODEL: ${DUDE_GOOGLE_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    entrypoint: ["node", "packages/mcp-server/dist/rest-gateway.js"]
    volumes:
      - sg_apis_state:/var/lib/sg-apis
    expose:
      - "3000"

  sg-apis-mcp:
    image: ghcr.io/gongahkia/sg-apis-mcp:${SG_APIS_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      SG_APIS_HTTP_AUTH_MODE: ${SG_APIS_HTTP_AUTH_MODE:-mixed}
      SG_APIS_REMOTE_BASE_URL: https://${PUBLIC_HOSTNAME}/mcp
      SG_APIS_OIDC_ISSUER: ${SG_APIS_OIDC_ISSUER}
      SG_APIS_OIDC_AUDIENCE: ${SG_APIS_OIDC_AUDIENCE}
      SG_APIS_OIDC_JWKS_URI: ${SG_APIS_OIDC_JWKS_URI:-}
      SG_APIS_OIDC_REQUIRED_SCOPES: ${SG_APIS_OIDC_REQUIRED_SCOPES:-}
      SG_APIS_OIDC_CLOCK_SKEW_SEC: ${SG_APIS_OIDC_CLOCK_SKEW_SEC:-60}
      SG_APIS_TOOLSETS: ${SG_APIS_TOOLSETS:-public,briefs,query,health,ops}
      SG_APIS_LOG_LEVEL: ${SG_APIS_LOG_LEVEL:-info}
      SG_APIS_STATE_DIR: /var/lib/sg-apis
      SG_API_ONEMAP_EMAIL: ${SG_API_ONEMAP_EMAIL:-}
      SG_API_ONEMAP_PASSWORD: ${SG_API_ONEMAP_PASSWORD:-}
      SG_API_URA_KEY: ${SG_API_URA_KEY:-}
      SG_API_LTA_KEY: ${SG_API_LTA_KEY:-}
      TINYFISH_API_KEY: ${TINYFISH_API_KEY:-}
    command: ["--transport", "http", "--host", "0.0.0.0", "--port", "3000"]
    volumes:
      - sg_apis_state:/var/lib/sg-apis
    expose:
      - "3000"

  caddy:
    image: caddy:2.10
    restart: unless-stopped
    depends_on:
      dude-assets:
        condition: service_completed_successfully
      dude-gateway:
        condition: service_started
      sg-apis-mcp:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - dude_web_assets:/srv/dude:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  sg_apis_state:
  dude_web_assets:
  caddy_data:
  caddy_config:
