<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dude dossier frame</title>
    <script src="./dude-dossier-widget.js"></script>
    <style>
      html,
      body {
        margin: 0;
        background: transparent;
      }

      body {
        padding: 0;
      }
    </style>
  </head>
  <body>
    <dude-dossier-widget id="widget"></dude-dossier-widget>
    <script type="module">
      const params = new URLSearchParams(window.location.search);
      const widget = document.querySelector("#widget");
      for (const [attribute, parameter] of [
        ["gateway-url", "gatewayUrl"],
        ["brand-name", "brandName"],
        ["identifier", "identifier"],
        ["modules", "modules"],
        ["sector-hints", "sectorHints"],
        ["theme", "theme"],
      ]) {
        const value = params.get(parameter);
        if (value !== null && value.trim() !== "") {
          widget.setAttribute(attribute, value);
        }
      }
    </script>
  </body>
</html>
