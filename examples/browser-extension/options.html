<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Swee Pulse Overlay Options</title>
    <style>
      body {
        color: #111827;
        font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-width: 320px;
        padding: 16px;
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
      }

      input {
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        box-sizing: border-box;
        font: inherit;
        padding: 8px 10px;
        width: 100%;
      }

      button {
        background: #111827;
        border: 0;
        border-radius: 6px;
        color: white;
        cursor: pointer;
        font: inherit;
        margin-top: 10px;
        padding: 8px 12px;
      }

      p {
        color: #475569;
        margin: 10px 0 0;
      }
    </style>
  </head>
  <body>
    <label for="gatewayUrl">Swee SG gateway URL</label>
    <input id="gatewayUrl" spellcheck="false" value="http://localhost:3000">
    <label for="webAppUrl" style="margin-top: 12px;">Swee SG web app URL</label>
    <input id="webAppUrl" spellcheck="false" value="http://localhost:5173">
    <button id="save" type="button">Save</button>
    <p id="status">Requests are made only after clicking a detected UEN.</p>
    <script src="options.js"></script>
  </body>
</html>
