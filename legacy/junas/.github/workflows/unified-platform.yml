name: Unified Platform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend-router-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            fastapi \
            "uvicorn[standard]" \
            pydantic-settings \
            celery \
            httpx \
            beautifulsoup4 \
            lxml \
            python-multipart \
            sse-starlette \
            pytest \
            pytest-asyncio
      - name: Run backend router tests
        run: pytest -q tests/test_*router.py
