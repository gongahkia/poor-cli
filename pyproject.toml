[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "poor-cli"
dynamic = ["version"]
description = "AI-powered CLI tool with multi-provider support (Gemini, OpenAI, Claude, Ollama)"
readme = "README.md"
requires-python = ">=3.11,<3.15"
license = "MIT"
authors = [
    {name = "poor-cli contributors", email = "contributors@poor-cli.dev"}
]
keywords = ["ai", "cli", "gemini", "openai", "claude", "ollama", "coding-assistant", "automation"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Utilities",
    "Typing :: Typed",
]
dependencies = [
    "google-genai>=1.0.0",
    "rich>=13.0.0",
    "PyYAML>=6.0",
    "aiofiles>=23.0.0",
    "aiohttp>=3.9.0",
    "aiortc>=1.14,<1.15",
    "cryptography>=41.0.0",
    "pydantic>=2.0,<3",
    "openai>=1.0.0",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.18.0"]
telegram = ["python-telegram-bot>=21.0"]
all = [
    "openai>=1.0.0",
    "anthropic>=0.18.0",
    "python-telegram-bot>=21.0",
]

[project.scripts]
poor-cli = "poor_cli.__main__:main"
poor-cli-server = "poor_cli.server:main"

[project.urls]
Homepage = "https://github.com/gongahkia/poor-cli"
Repository = "https://github.com/gongahkia/poor-cli"
Issues = "https://github.com/gongahkia/poor-cli/issues"

[tool.setuptools]
packages = ["poor_cli", "poor_cli.integrations", "poor_cli.providers", "poor_cli.readers", "poor_cli.server", "poor_cli.telegram", "poor_cli.telegram.commands"]

[tool.setuptools.package-data]
poor_cli = ["*.json"]

[tool.setuptools.dynamic]
version = {attr = "poor_cli.__version__"}
