repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [check, poor_cli/]
      - id: ruff-format
        args: [--check, poor_cli/]
  - repo: local
    hooks:
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --manifest-path poor-cli-tui/Cargo.toml --quiet -- -D warnings
        language: system
        pass_filenames: false
        files: \.rs$
      - id: lua-syntax
        name: lua syntax check
        entry: bash -c 'for f in "$@"; do luac5.4 -p "$f" || exit 1; done' --
        language: system
        files: nvim-poor-cli/.*\.lua$
