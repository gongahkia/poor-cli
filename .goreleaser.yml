version: 2
project_name: gocli-poor

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: gocli-poor
    main: ./cmd/gocli-poor
    binary: gocli-poor
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.Version={{ .Version }} -X main.Commit={{ .Commit }}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

brews:
  - name: gocli-poor
    description: "TUI chat client for poor-cli"
    homepage: "https://github.com/gongahkia/gocli-poor"
    repository:
      owner: gongahkia
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    install: |
      bin.install "gocli-poor"
    test: |
      assert_match version.to_s, shell_output("#{bin}/gocli-poor --version")

release:
  github:
    owner: gongahkia
    name: gocli-poor
  draft: true
  prerelease: auto
