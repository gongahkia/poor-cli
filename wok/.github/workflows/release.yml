name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.ext == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../wok-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.ext }} wok
          cd ../../..

      - name: Package (macOS app bundle)
        if: contains(matrix.target, 'apple-darwin')
        run: |
          WOK_SKIP_BUILD=1 packaging/macos/bundle.sh Wok.app ${{ matrix.target }}
          tar czf wok-${{ github.ref_name }}-${{ matrix.target }}-app.tar.gz Wok.app

      - name: Package (.deb)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          WOK_SKIP_BUILD=1 WOK_TARGET=${{ matrix.target }} packaging/linux/build_deb.sh dist/linux

      - name: Package (Windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/wok.exe -DestinationPath wok-${{ env.GITHUB_REF_NAME }}-${{ matrix.target }}.${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wok-${{ matrix.target }}
          path: |
            wok-*.${{ matrix.ext }}
            wok-*-app.tar.gz
            dist/linux/*.deb

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create checksums
        run: sha256sum wok-* > checksums.sha256

      - name: Verify checksums coverage
        run: |
          artifact_count=$(find . -maxdepth 1 -type f -name 'wok-*' ! -name 'checksums.sha256' | wc -l | tr -d ' ')
          checksum_count=$(wc -l < checksums.sha256 | tr -d ' ')
          test "$artifact_count" -eq "$checksum_count"
          sha256sum -c checksums.sha256

      - name: Smoke test packaged artifacts
        run: |
          set -euo pipefail
          for tarball in wok-*.tar.gz; do
            if [[ "$tarball" == *"-app.tar.gz" ]]; then
              tar tzf "$tarball" | grep -Eq '^Wok\.app/?'
            else
              tar tzf "$tarball" | grep -Eq '(^|/)wok$'
            fi
          done

          for zip in wok-*.zip; do
            unzip -l "$zip" | grep -Eq 'wok\.exe$'
          done

          for deb in dist/linux/*.deb; do
            dpkg-deb --info "$deb" >/dev/null
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            wok-*
            checksums.sha256
          generate_release_notes: true
