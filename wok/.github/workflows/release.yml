name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.ext == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../wok-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.ext }} wok
          cd ../../..

      - name: Package (macOS app bundle)
        if: contains(matrix.target, 'apple-darwin')
        run: |
          WOK_SKIP_BUILD=1 packaging/macos/bundle.sh Wok.app ${{ matrix.target }}
          tar czf wok-${{ github.ref_name }}-${{ matrix.target }}-app.tar.gz Wok.app

      - name: Package (.deb)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          WOK_SKIP_BUILD=1 WOK_TARGET=${{ matrix.target }} packaging/linux/build_deb.sh dist/linux

      - name: Package (Windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/wok.exe -DestinationPath wok-${{ env.GITHUB_REF_NAME }}-${{ matrix.target }}.${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wok-${{ matrix.target }}
          path: |
            wok-*.${{ matrix.ext }}
            wok-*-app.tar.gz
            dist/linux/*.deb

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate repository SBOM
        run: |
          syft dir:. \
            -o cyclonedx-json=release-artifacts/wok-${{ github.ref_name }}-sbom.cdx.json

      - name: Create checksums
        run: |
          set -euo pipefail
          cd release-artifacts
          find . -maxdepth 3 -type f \( -name 'wok-*' -o -name '*.deb' \) \
            ! -name 'checksums.sha256' -print0 \
            | sort -z \
            | xargs -0 sha256sum > checksums.sha256

      - name: Verify checksums coverage
        run: |
          set -euo pipefail
          cd release-artifacts
          artifact_count=$(find . -maxdepth 3 -type f \( -name 'wok-*' -o -name '*.deb' \) ! -name 'checksums.sha256' | wc -l | tr -d ' ')
          checksum_count=$(wc -l < checksums.sha256 | tr -d ' ')
          test "$artifact_count" -eq "$checksum_count"
          sha256sum -c checksums.sha256

      - name: Smoke test packaged artifacts
        run: |
          set -euo pipefail
          cd release-artifacts
          for tarball in wok-*.tar.gz; do
            if [[ "$tarball" == *"-app.tar.gz" ]]; then
              tar tzf "$tarball" | grep -Eq '^Wok\.app/?'
            else
              tar tzf "$tarball" | grep -Eq '(^|/)wok$'
            fi
          done

          for zip in wok-*.zip; do
            unzip -l "$zip" | grep -Eq 'wok\.exe$'
          done

          for deb in dist/linux/*.deb; do
            dpkg-deb --info "$deb" >/dev/null
          done

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums with keyless Sigstore
        run: |
          cosign sign-blob --yes \
            --output-signature release-artifacts/checksums.sha256.sig \
            --output-certificate release-artifacts/checksums.sha256.pem \
            release-artifacts/checksums.sha256

      - name: Verify checksum signature
        run: |
          cosign verify-blob \
            --certificate release-artifacts/checksums.sha256.pem \
            --signature release-artifacts/checksums.sha256.sig \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity "${{ github.server_url }}/${{ github.repository }}/.github/workflows/release.yml@${{ github.ref }}" \
            release-artifacts/checksums.sha256

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            release-artifacts/wok-*
            release-artifacts/dist/linux/*.deb
            release-artifacts/checksums.sha256
            release-artifacts/checksums.sha256.sig
            release-artifacts/checksums.sha256.pem

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/wok-*
            release-artifacts/dist/linux/*.deb
            release-artifacts/checksums.sha256
            release-artifacts/checksums.sha256.sig
            release-artifacts/checksums.sha256.pem
          generate_release_notes: true
