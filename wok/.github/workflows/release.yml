name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.ext == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../walk-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.ext }} walk
          cd ../../..

      - name: Package (macOS app bundle)
        if: contains(matrix.target, 'apple-darwin')
        run: |
          WALK_SKIP_BUILD=1 packaging/macos/bundle.sh Walk.app ${{ matrix.target }}
          tar czf walk-${{ github.ref_name }}-${{ matrix.target }}-app.tar.gz Walk.app

      - name: Package (.deb)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          WALK_SKIP_BUILD=1 WALK_TARGET=${{ matrix.target }} packaging/linux/build_deb.sh dist/linux

      - name: Package (Windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/walk.exe -DestinationPath walk-${{ env.GITHUB_REF_NAME }}-${{ matrix.target }}.${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: walk-${{ matrix.target }}
          path: |
            walk-*.${{ matrix.ext }}
            walk-*-app.tar.gz
            dist/linux/*.deb

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create checksums
        run: sha256sum walk-* > checksums.sha256

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            walk-*
            checksums.sha256
          generate_release_notes: true
