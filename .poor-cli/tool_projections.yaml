defaults:
  max_tokens: 5000

tool_projections:
  gh_pr_list:
    extract:
      - number
      - title
      - state
      - author.login
      - url

  gh_pr_view:
    max_tokens: 2000
    extract:
      - number
      - title
      - body
      - state
      - author.login
      - url

  gh_issue_list:
    extract:
      - number
      - title
      - state
      - author.login
      - url

  gh_issue_view:
    max_tokens: 2000
    extract:
      - number
      - title
      - body
      - state
      - author.login
      - url

  git_status:
    extract:
      - branch
      - modified
      - added
      - deleted
      - untracked

  list_directory:
    max_tokens: 1500
    extract:
      - name
      - type
      - size

  # customize these patterns for your actual MCP server names
  "my-mcp-server:*":
    max_tokens: 1500
    extract:
      - content
      - structuredContent
      - metadata
